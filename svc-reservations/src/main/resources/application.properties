spring.application.name=svc-reservations
server.port=8082

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:reservations_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

rooms.service.url=${ROOMS_SERVICE_URL:http://localhost:8081}

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.roomsClient.sliding-window-size=5
resilience4j.circuitbreaker.instances.roomsClient.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.roomsClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.roomsClient.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.roomsClient.permitted-number-of-calls-in-half-open-state=2

# Resilience4j - Retry
resilience4j.retry.instances.roomsClient.max-attempts=3
resilience4j.retry.instances.roomsClient.wait-duration=2s

# Logging
logging.level.com.uti.svcreservations=INFO
